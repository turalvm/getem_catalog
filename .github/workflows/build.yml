name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    strategy:
      max-parallel: 1
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip

    - name: Install wheel
      run: |
        pip install --default-timeout=100 --retries=5 wheel

    - name: Install wxPython
      run: |
        pip install --default-timeout=100 --retries=5 --only-binary :all: wxPython

    - name: Install other dependencies
      run: |
        pip install --default-timeout=100 --retries=5 pandas requests selenium pyinstaller cryptography pywin32

    - name: Build with PyInstaller using spec file
      run: |
        pyinstaller getem.spec

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        files: dist/getem_catalog.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}